<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weapons Guid</title>
  <link rel="stylesheet" href="styles.css?v=lang-20260427">
</head>
<body>
  <header class="app-header">
    <div class="header-info">
      <div id="languageSwitch" class="segmented language-switch" aria-label="Language">
        <button type="button" data-language="en">EN</button>
        <button type="button" data-language="ru">RU</button>
      </div>
      <button id="creatorsButton" class="info-button" type="button">Creators</button>
    </div>
    <div class="header-title">
      <p id="heroEyebrow" class="eyebrow">20th century</p>
      <h1 id="heroTitle">Weapons Reference</h1>
    </div>
    <label class="search">
      <span id="searchLabel">Search</span>
      <input id="searchInput" type="search" placeholder="Name, country, description">
    </label>
  </header>

  <main>
    <section class="toolbar" aria-label="Filters">
      <div>
        <p id="countryTitle" class="filter-title">Country</p>
        <div id="countryFilters" class="segmented"></div>
      </div>
      <div>
        <p id="categoryTitle" class="filter-title">Category</p>
        <div id="categoryFilters" class="segmented"></div>
      </div>
    </section>

    <section class="summary">
      <div>
        <strong id="itemCount">0</strong>
        <span id="itemCountLabel">items in the catalog</span>
      </div>
      <button id="resetFilters" type="button">Reset filters</button>
    </section>

    <section id="catalogGrid" class="catalog-grid" aria-live="polite"></section>
  </main>

  <dialog id="itemDialog" class="item-dialog">
    <button id="closeDialog" class="close-button" type="button" aria-label="Close">x</button>
    <div class="dialog-layout">
      <img id="dialogImage" alt="">
      <div class="dialog-content">
        <p id="dialogMeta" class="eyebrow"></p>
        <h2 id="dialogTitle"></h2>
        <dl id="dialogSpecs"></dl>
        <p id="dialogDescription"></p>
      </div>
    </div>
  </dialog>

  <dialog id="creatorsDialog" class="info-dialog">
    <button id="closeCreatorsDialog" class="close-button" type="button" aria-label="Close">x</button>
    <div class="info-dialog-content">
      <p id="creatorsEyebrow" class="eyebrow">Information</p>
      <h2 id="creatorsTitle">Info</h2>
      <p id="creatorLine1"><strong>Kochurov Sergey</strong> - backend.</p>
      <p id="creatorLine2"><strong>Suslin Akim</strong> - test + data collect.</p>
      <p id="creatorLine3"><strong>Kuznetcov Kirill</strong> - team lead.</p>
      <p id="creatorLine4"><strong>Bodorin Gregory</strong> - frontend.</p>
      <p id="creatorsNote" class="info-note">Data was collected from open source.</p>
    </div>
  </dialog>

  <template id="cardTemplate">
    <article class="catalog-card">
      <button type="button">
        <div class="image-wrap">
          <img alt="">
        </div>
        <div class="card-body">
          <span class="card-meta"></span>
          <h2></h2>
        </div>
      </button>
    </article>
  </template>

  <script src="app.js?v=lang-20260427" defer></script>
</body>
</html>
